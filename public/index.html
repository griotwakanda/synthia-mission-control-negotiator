<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Synthia Mission Control</title>
    <style>
      body { font-family: Inter, system-ui, sans-serif; margin: 0; background: #0b1020; color: #e8ebff; }
      .wrap { max-width: 1100px; margin: 0 auto; padding: 24px; }
      .grid { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; }
      .card { background: #131a33; border: 1px solid #263159; border-radius: 12px; padding: 16px; }
      h1 { margin: 0 0 16px; }
      .line { padding: 8px; border-bottom: 1px solid #28345f; }
      button { border: 0; border-radius: 8px; padding: 10px 14px; font-weight: 700; cursor: pointer; margin-right: 8px; }
      .approve { background: #1fc77b; color: #02140b; }
      .reject { background: #ff5770; color: #22020c; }
      .ask { background: #f8b84a; color: #261600; }
      pre { white-space: pre-wrap; background: #0d1328; padding: 12px; border-radius: 8px; }
      small { color: #9aa7d6; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>🎛️ Synthia Mission Control</h1>
      <div class="grid">
        <div class="card">
          <h2>Live Transcript (Simulator)</h2>
          <div id="transcript"></div>
        </div>
        <div class="card">
          <h2>Approval Gate</h2>
          <button class="approve" onclick="submitDecision('APPROVE')">APPROVE</button>
          <button class="reject" onclick="submitDecision('REJECT')">REJECT</button>
          <button class="ask" onclick="submitDecision('ASK_MORE')">ASK_MORE</button>
          <p><small id="decision">No decision yet</small></p>
        </div>
      </div>

      <div class="card" style="margin-top:16px;">
        <h2>Negotiation Prompt & Suggested Next Response</h2>
        <button onclick="refreshSuggestion()">Refresh Suggestion</button>
        <pre id="suggestion">Loading…</pre>
      </div>
    </div>

    <script>
      async function loadTranscript() {
        const res = await fetch('/api/transcript/simulate');
        const data = await res.json();
        const el = document.getElementById('transcript');
        el.innerHTML = data.transcript.map(l => `<div class="line"><strong>${l.ts} ${l.speaker}</strong><br/>${l.text}</div>`).join('');
      }

      async function submitDecision(decision) {
        await fetch('/api/decision', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ decision })
        });
        document.getElementById('decision').textContent = `Last decision: ${decision}`;
      }

      async function refreshSuggestion() {
        const res = await fetch('/api/prompt/next', { method: 'POST' });
        const data = await res.json();
        document.getElementById('suggestion').textContent = data.suggestion;
      }

      loadTranscript();
      refreshSuggestion();
    </script>
  </body>
</html>
