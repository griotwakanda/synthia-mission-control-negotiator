<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Synthia Mission Control</title>
    <style>
      :root {
        --bg: #070b17;
        --panel: #101933;
        --panel-2: #121f40;
        --text: #ebf0ff;
        --muted: #9daace;
        --line: #273866;
        --accent: #78a8ff;
        --good: #45d49a;
        --warn: #ff7d7d;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background:
          radial-gradient(1200px 400px at 10% -10%, #1c2f63 0%, transparent 50%),
          radial-gradient(900px 300px at 90% 0%, #192748 0%, transparent 50%),
          var(--bg);
        color: var(--text);
      }

      .wrap { max-width: 1180px; margin: 0 auto; padding: 28px 22px 34px; }
      h1 { margin: 0 0 6px; font-size: 1.55rem; }
      .sub { color: var(--muted); margin-bottom: 16px; }
      .status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 0.88rem;
        color: var(--muted);
        background: rgba(17, 28, 56, 0.75);
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 8px 12px;
        margin-bottom: 18px;
      }
      .dot { width: 8px; height: 8px; border-radius: 999px; background: var(--accent); }

      .grid {
        display: grid;
        grid-template-columns: minmax(320px, 1fr) minmax(360px, 1.2fr);
        gap: 16px;
      }

      .card {
        background: linear-gradient(180deg, rgba(18, 31, 64, 0.95) 0%, rgba(16, 25, 51, 0.95) 100%);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 16px;
      }

      h2 { margin: 2px 0 14px; font-size: 1.04rem; }
      label { display: block; margin: 12px 0 6px; color: #c6d4fc; font-size: 0.9rem; }
      input, textarea {
        width: 100%;
        border: 1px solid #34508f;
        background: #0b1430;
        color: var(--text);
        border-radius: 10px;
        padding: 10px 12px;
        font: inherit;
      }
      textarea { min-height: 100px; resize: vertical; }

      .row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; }
      button {
        border: 0;
        border-radius: 10px;
        padding: 10px 14px;
        font-weight: 700;
        color: #081125;
        cursor: pointer;
        background: #9eb9ff;
      }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      .primary { background: var(--good); color: #022215; }
      .danger { background: var(--warn); color: #2b0505; }

      .meta {
        margin-top: 12px;
        color: var(--muted);
        font-size: 0.85rem;
        line-height: 1.45;
      }

      .feed {
        max-height: 560px;
        overflow: auto;
        border: 1px solid #2e4478;
        border-radius: 12px;
        background: #0b1430;
      }
      .line {
        padding: 11px 12px;
        border-bottom: 1px solid #1a2a53;
      }
      .line:last-child { border-bottom: 0; }
      .line strong { color: #b8ccff; font-size: 0.88rem; letter-spacing: 0.01em; }
      .line p { margin: 6px 0 0; }
      .empty { color: var(--muted); padding: 16px; }

      .error {
        margin-top: 10px;
        color: #ffb5b5;
        font-size: 0.9rem;
      }

      @media (max-width: 980px) {
        .grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>📞 Synthia Live Mission Control</h1>
      <div class="sub">Launch a real Twilio call, steer it live, and monitor speech events in real time.</div>
      <div class="status"><span class="dot"></span><span id="statusText">Status: idle</span></div>

      <div class="grid">
        <section class="card">
          <h2>Call Controls</h2>

          <label for="to">Phone number to call</label>
          <input id="to" type="text" placeholder="+15551234567" />

          <label for="objective">Call objective</label>
          <textarea id="objective" placeholder="Negotiate a lower monthly bill and remove activation fees."></textarea>

          <div class="row">
            <button class="primary" id="callBtn">Call</button>
            <button class="danger" id="endBtn">End Call</button>
          </div>

          <label for="instruction">Live instruction</label>
          <textarea id="instruction" placeholder="Ask for the retention team if the first agent cannot match competitor pricing."></textarea>
          <div class="row">
            <button id="sendInstructionBtn">Send instruction</button>
          </div>

          <div class="meta">
            <div><strong>Active call SID:</strong> <span id="callSid">—</span></div>
            <div><strong>Last update:</strong> <span id="updatedAt">—</span></div>
          </div>

          <div class="error" id="error"></div>
        </section>

        <section class="card">
          <h2>Live Transcription Feed</h2>
          <div class="feed" id="feed">
            <div class="empty">Waiting for call events...</div>
          </div>
        </section>
      </div>
    </div>

    <script>
      const el = {
        to: document.getElementById('to'),
        objective: document.getElementById('objective'),
        instruction: document.getElementById('instruction'),
        callBtn: document.getElementById('callBtn'),
        endBtn: document.getElementById('endBtn'),
        sendInstructionBtn: document.getElementById('sendInstructionBtn'),
        statusText: document.getElementById('statusText'),
        callSid: document.getElementById('callSid'),
        updatedAt: document.getElementById('updatedAt'),
        feed: document.getElementById('feed'),
        error: document.getElementById('error')
      };

      function setError(message = '') {
        el.error.textContent = message;
      }

      function renderTranscript(lines) {
        if (!lines || !lines.length) {
          el.feed.innerHTML = '<div class="empty">Waiting for call events...</div>';
          return;
        }

        el.feed.innerHTML = lines
          .map((line) => {
            const ts = new Date(line.ts).toLocaleTimeString();
            return `<div class="line"><strong>${line.speaker} • ${ts}</strong><p>${line.text}</p></div>`;
          })
          .join('');

        el.feed.scrollTop = el.feed.scrollHeight;
      }

      function applyState(state) {
        el.statusText.textContent = `Status: ${state.callStatus || 'unknown'}`;
        el.callSid.textContent = state.activeCallSid || '—';
        el.updatedAt.textContent = state.updatedAt ? new Date(state.updatedAt).toLocaleString() : '—';

        if (state.toPhoneNumber && !el.to.value) el.to.value = state.toPhoneNumber;
        if (state.objective && !el.objective.value) el.objective.value = state.objective;
        if (state.liveInstruction && !el.instruction.value) el.instruction.value = state.liveInstruction;

        renderTranscript(state.transcript || []);
      }

      async function postJson(url, body) {
        const res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body || {})
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          throw new Error(data.error || `Request failed (${res.status})`);
        }
        return data;
      }

      async function loadInitialState() {
        try {
          const res = await fetch('/api/call/state');
          const state = await res.json();
          applyState(state);
        } catch (err) {
          setError(err.message || 'Failed to load initial state');
        }
      }

      function connectStream() {
        const source = new EventSource('/api/call/transcription/stream');
        source.onmessage = (event) => {
          try {
            applyState(JSON.parse(event.data));
            setError('');
          } catch (err) {
            setError('Stream parse error');
          }
        };
        source.onerror = () => {
          setError('Stream disconnected. Reconnecting...');
        };
      }

      el.callBtn.onclick = async () => {
        setError('');
        try {
          await postJson('/api/call/start', {
            to: el.to.value.trim(),
            objective: el.objective.value.trim()
          });
        } catch (err) {
          setError(err.message || 'Failed to start call');
        }
      };

      el.endBtn.onclick = async () => {
        setError('');
        try {
          await postJson('/api/call/end', {});
        } catch (err) {
          setError(err.message || 'Failed to end call');
        }
      };

      el.sendInstructionBtn.onclick = async () => {
        setError('');
        try {
          await postJson('/api/call/instruction', {
            instruction: el.instruction.value.trim()
          });
        } catch (err) {
          setError(err.message || 'Failed to send instruction');
        }
      };

      loadInitialState();
      connectStream();
    </script>
  </body>
</html>
